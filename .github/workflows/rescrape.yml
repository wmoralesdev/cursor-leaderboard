name: Rescrape due profiles

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: rescrape-due
  cancel-in-progress: false

jobs:
  rescrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rescrape profiles past max age
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPE_MAX_AGE_HOURS: ${{ vars.SCRAPE_MAX_AGE_HOURS }}
          SCRAPE_BATCH_LIMIT: ${{ vars.SCRAPE_BATCH_LIMIT }}
          SCRAPE_ERROR_RETRY_HOURS: ${{ vars.SCRAPE_ERROR_RETRY_HOURS }}
        run: pnpm rescrape --due --limit=50 --delay-ms=500
