[build]
  command = "pnpm db:migrate:deploy && pnpm build:netlify"
  publish = "dist/client"

[dev]
  command = "pnpm dev"
  port = 3000

[build.environment]
  NODE_VERSION = "22"
  DEPLOY_TARGET = "netlify"
  # DATABASE_URL — Neon pooled connection (set in Netlify UI)
  # DIRECT_URL — optional; migrations use direct URL (derived from DATABASE_URL if omitted)
